name: Magma Analyze With CodeQL
'on':
  push:
    branches:
    - master
    - gh-pages
    - v1.*
  pull_request:
    branches:
    - master
  schedule:
  - cron: 21 5 * * 0
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha
    }}
  cancel-in-progress: true
jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language:
        - go
        - javascript
        - python
    steps:
    - name: Checkout repository
      uses: actions/checkout@93ea575cb5d8a053eaa0ac8fa3b40d7e05a33cc8
    - name: Initialize CodeQL
      uses: github/codeql-action/init@ec3cf9c605b848da5f1e41e8452719eb1ccfb9a6
      with:
        languages: ${{ matrix.language }}
    - name: Autobuild
      uses: github/codeql-action/autobuild@ec3cf9c605b848da5f1e41e8452719eb1ccfb9a6
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@ec3cf9c605b848da5f1e41e8452719eb1ccfb9a6
      env:
        NODE_OPTIONS: --max-old-space-size=5120
    - name: Notify failure to slack
      if: failure() && github.ref == 'refs/heads/master'
      uses: rtCamp/action-slack-notify@12e36fc18b0689399306c2e0b3e0f2978b7f1ee7
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_CI }}
        SLACK_TITLE: Github action CodeQL-analysis ${{ matrix.language }} failed
        SLACK_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title
          }}
        SLACK_USERNAME: ${{ github.workflow }} ${{ matrix.language }}
        SLACK_ICON_EMOJI: ':boom:'
        SLACK_COLOR: '#FF0000'
        SLACK_FOOTER: ' '
